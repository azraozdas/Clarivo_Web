<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarivo — My Profile</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <header>
        <nav class="navbar navbar-expand-lg clarivo-navbar" id="mainNav">
            <div class="container">

                <!-- Brand -->
                <a class="navbar-brand clarivo-brand" href="index.html">
                    <img src="assets/Logo.png" alt="Clarivo" class="brand-logo">
                    <span class="brand-text">Clarivo</span>
                </a>

                <!-- Mobile toggle -->
                <button class="navbar-toggler clarivo-toggler" type="button"
                        data-bs-toggle="collapse" data-bs-target="#navbarLinks"
                        aria-controls="navbarLinks" aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <!-- Nav links -->
                <div class="collapse navbar-collapse" id="navbarLinks">
                    <ul class="navbar-nav clarivo-nav-list">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#market">Market</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="portfolio.html">Portfolio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#news">News</a>
                        </li>
                    </ul>

                    <!-- Right-side actions -->
                    <div class="nav-actions">
                        <span class="nav-lang">
                            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                            EN
                        </span>
                        <a href="profile.html" class="nav-profile-btn active-link" id="navProfileBtn" aria-label="My Profile">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </a>
                        <a href="pro.html" class="btn btn-clarivo-cta">Upgrade</a>
                    </div>
                </div>

            </div>
        </nav>
    </header>

    <!-- ===== PROFILE SECTION ===== -->
    <main class="profile-section">
        <div class="container">

            <div class="row gy-4 justify-content-center">

                <!-- Left column: profile info -->
                <div class="col-lg-5 col-12">
                    <div class="profile-card">

                        <!-- Avatar circle with initials -->
                        <div class="profile-avatar" id="profileAvatar">?</div>

                        <!-- Name and email -->
                        <h2 class="profile-name" id="profileName">—</h2>
                        <p class="profile-email" id="profileEmail">—</p>

                        <!-- Plan badge -->
                        <div class="profile-plan-row">
                            <span class="profile-plan-badge">Free Plan</span>
                        </div>

                        <!-- Upgrade button -->
                        <a href="pro.html" class="btn btn-clarivo-primary profile-upgrade-btn">
                            Upgrade to Pro
                        </a>

                    </div>
                </div>

                <!-- Right column: account settings -->
                <div class="col-lg-5 col-12">
                    <div class="profile-card">

                        <h3 class="profile-settings-title">Account Settings</h3>

                        <!-- Setting row: language -->
                        <div class="profile-setting-row">
                            <div class="profile-setting-info">
                                <p class="profile-setting-label">Language</p>
                                <p class="profile-setting-value">English</p>
                            </div>
                            <button class="profile-setting-btn">Change</button>
                        </div>

                        <!-- Setting row: notifications -->
                        <div class="profile-setting-row">
                            <div class="profile-setting-info">
                                <p class="profile-setting-label">Notifications</p>
                                <p class="profile-setting-value">Enabled</p>
                            </div>
                            <button class="profile-setting-btn">Manage</button>
                        </div>

                        <!-- Setting row: plan -->
                        <div class="profile-setting-row">
                            <div class="profile-setting-info">
                                <p class="profile-setting-label">Current Plan</p>
                                <p class="profile-setting-value">Free</p>
                            </div>
                            <a href="pro.html" class="profile-setting-btn">View Plans</a>
                        </div>

                        <div class="profile-divider"></div>

                        <!-- Logout -->
                        <button class="profile-logout-btn" id="logoutBtn">
                            Sign Out
                        </button>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="clarivo-footer">
        <div class="container">
            <div class="footer-divider" style="margin-top:0"></div>
            <p class="footer-copy">&copy; 2026 Clarivo. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ---- Load user from localStorage ----

        var savedUser = localStorage.getItem("clarivoUser");

        // If not logged in, redirect to login page
        if (!savedUser) {
            window.location.href = "auth.html";
        } else {
            var user = JSON.parse(savedUser);

            // Fill in name
            var nameEl = document.getElementById("profileName");
            if (nameEl) {
                nameEl.textContent = user.name || user.email;
            }

            // Fill in email
            var emailEl = document.getElementById("profileEmail");
            if (emailEl) {
                emailEl.textContent = user.email || "—";
            }

            // Avatar: first letter of name
            var avatarEl = document.getElementById("profileAvatar");
            if (avatarEl && user.name) {
                avatarEl.textContent = user.name.charAt(0).toUpperCase();
            } else if (avatarEl && user.email) {
                avatarEl.textContent = user.email.charAt(0).toUpperCase();
            }
        }

        // ---- Logout button ----

        var logoutBtn = document.getElementById("logoutBtn");

        if (logoutBtn) {
            logoutBtn.addEventListener("click", function () {
                localStorage.removeItem("clarivoUser");
                window.location.href = "index.html";
            });
        }
    </script>

</body>
</html>
