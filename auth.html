<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarivo — Sign In</title>

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Shared styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Auth-specific styles -->
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-body">

    <!-- ===== NAVBAR ===== -->
    <header>
        <nav class="navbar navbar-expand-lg clarivo-navbar" id="mainNav">
            <div class="container">

                <!-- Brand -->
                <a class="navbar-brand clarivo-brand" href="index.html">
                    <img src="assets/Logo.png" alt="Clarivo" class="brand-logo">
                    <span class="brand-text">Clarivo</span>
                </a>

                <!-- Mobile toggle -->
                <button class="navbar-toggler clarivo-toggler" type="button"
                        data-bs-toggle="collapse" data-bs-target="#navbarLinks"
                        aria-controls="navbarLinks" aria-expanded="false"
                        aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <!-- Nav links -->
                <div class="collapse navbar-collapse" id="navbarLinks">
                    <ul class="navbar-nav clarivo-nav-list">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#market">Market</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="portfolio.html">Portfolio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="index.html#news">News</a>
                        </li>
                    </ul>

                    <!-- Right-side actions -->
                    <div class="nav-actions">
                        <span class="nav-lang">
                            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                            EN
                        </span>
                        <a href="pro.html" class="btn btn-clarivo-cta">Upgrade</a>
                    </div>
                </div>

            </div>
        </nav>
    </header>

    <!-- ===== AUTH SECTION ===== -->
    <main class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-5 col-lg-6 col-md-8 col-12">

                    <!-- Card -->
                    <div class="auth-card">

                        <!-- Tab switcher -->
                        <div class="auth-tabs">
                            <button class="auth-tab active" id="tab-login" aria-controls="panel-login" aria-selected="true">
                                Sign In
                            </button>
                            <button class="auth-tab" id="tab-register" aria-controls="panel-register" aria-selected="false">
                                Create Account
                            </button>
                        </div>

                        <!-- ===== LOGIN PANEL ===== -->
                        <div class="auth-panel" id="panel-login">

                            <div class="auth-header">
                                <h1 class="auth-title">Welcome back</h1>
                                <p class="auth-subtitle">Sign in to your Clarivo account</p>
                            </div>

                            <form class="auth-form" id="loginForm" novalidate>

                                <div class="form-group">
                                    <label class="form-label-custom" for="loginEmail">Email address</label>
                                    <input
                                        type="email"
                                        id="loginEmail"
                                        class="form-input"
                                        placeholder="you@example.com"
                                        autocomplete="email"
                                        required
                                    >
                                    <span class="input-error" id="loginEmailError"></span>
                                </div>

                                <div class="form-group">
                                    <div class="label-row">
                                        <label class="form-label-custom" for="loginPassword">Password</label>
                                        <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>
                                    </div>
                                    <div class="input-wrapper">
                                        <input
                                            type="password"
                                            id="loginPassword"
                                            class="form-input"
                                            placeholder="••••••••"
                                            autocomplete="current-password"
                                            required
                                        >
                                        <button type="button" class="toggle-pw" aria-label="Toggle password visibility" data-target="loginPassword">
                                            <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                            <svg class="eye-icon eye-hide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                        </button>
                                    </div>
                                    <span class="input-error" id="loginPasswordError"></span>
                                </div>

                                <div class="form-check-row">
                                    <label class="custom-checkbox">
                                        <input type="checkbox" id="rememberMe">
                                        <span class="checkmark"></span>
                                        <span class="check-label">Remember me for 30 days</span>
                                    </label>
                                </div>

                                <button type="submit" class="btn-auth-submit">Sign In</button>

                                <div class="auth-divider">
                                    <span>or continue with</span>
                                </div>

                                <div class="social-auth">
                                    <button type="button" class="btn-social">
                                        <img src="assets/google_logo.png" alt="Google" class="social-logo">
                                        Continue with Google
                                    </button>
                                    <button type="button" class="btn-social">
                                        <img src="assets/apple_logo.png" alt="Apple" class="social-logo">
                                        Continue with Apple
                                    </button>
                                </div>

                            </form>
                        </div>

                        <!-- ===== REGISTER PANEL ===== -->
                        <div class="auth-panel hidden" id="panel-register">

                            <div class="auth-header">
                                <h1 class="auth-title">Create your account</h1>
                                <p class="auth-subtitle">Join Clarivo and start tracking the market</p>
                            </div>

                            <form class="auth-form" id="registerForm" novalidate>

                                <div class="form-row-two">
                                    <div class="form-group">
                                        <label class="form-label-custom" for="regFirstName">First name</label>
                                        <input
                                            type="text"
                                            id="regFirstName"
                                            class="form-input"
                                            placeholder="Jane"
                                            autocomplete="given-name"
                                            required
                                        >
                                        <span class="input-error" id="regFirstNameError"></span>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label-custom" for="regLastName">Last name</label>
                                        <input
                                            type="text"
                                            id="regLastName"
                                            class="form-input"
                                            placeholder="Doe"
                                            autocomplete="family-name"
                                            required
                                        >
                                        <span class="input-error" id="regLastNameError"></span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label class="form-label-custom" for="regEmail">Email address</label>
                                    <input
                                        type="email"
                                        id="regEmail"
                                        class="form-input"
                                        placeholder="you@example.com"
                                        autocomplete="email"
                                        required
                                    >
                                    <span class="input-error" id="regEmailError"></span>
                                </div>

                                <div class="form-group">
                                    <label class="form-label-custom" for="regPassword">Password</label>
                                    <div class="input-wrapper">
                                        <input
                                            type="password"
                                            id="regPassword"
                                            class="form-input"
                                            placeholder="Min. 8 characters"
                                            autocomplete="new-password"
                                            required
                                        >
                                        <button type="button" class="toggle-pw" aria-label="Toggle password visibility" data-target="regPassword">
                                            <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                            <svg class="eye-icon eye-hide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                        </button>
                                    </div>
                                    <div class="password-strength" id="strengthBar">
                                        <div class="strength-track">
                                            <div class="strength-fill" id="strengthFill"></div>
                                        </div>
                                        <span class="strength-label" id="strengthLabel"></span>
                                    </div>
                                    <span class="input-error" id="regPasswordError"></span>
                                </div>

                                <div class="form-group">
                                    <label class="form-label-custom" for="regConfirm">Confirm password</label>
                                    <div class="input-wrapper">
                                        <input
                                            type="password"
                                            id="regConfirm"
                                            class="form-input"
                                            placeholder="••••••••"
                                            autocomplete="new-password"
                                            required
                                        >
                                        <button type="button" class="toggle-pw" aria-label="Toggle password visibility" data-target="regConfirm">
                                            <svg class="eye-icon eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                            <svg class="eye-icon eye-hide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                        </button>
                                    </div>
                                    <span class="input-error" id="regConfirmError"></span>
                                </div>

                                <div class="form-check-row">
                                    <label class="custom-checkbox">
                                        <input type="checkbox" id="agreeTerms" required>
                                        <span class="checkmark"></span>
                                        <span class="check-label">
                                            I agree to the
                                            <a href="#" class="terms-link">Terms of Use</a>
                                            and
                                            <a href="#" class="terms-link">Privacy Policy</a>
                                        </span>
                                    </label>
                                    <span class="input-error" id="agreeTermsError"></span>
                                </div>

                                <button type="submit" class="btn-auth-submit">Create Account</button>

                                <div class="auth-divider">
                                    <span>or continue with</span>
                                </div>

                                <div class="social-auth">
                                    <button type="button" class="btn-social">
                                        <img src="assets/google_logo.png" alt="Google" class="social-logo">
                                        Continue with Google
                                    </button>
                                    <button type="button" class="btn-social">
                                        <img src="assets/apple_logo.png" alt="Apple" class="social-logo">
                                        Continue with Apple
                                    </button>
                                </div>

                            </form>
                        </div>

                    </div>
                    <!-- /auth-card -->

                </div>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="clarivo-footer">
        <div class="container">
            <div class="footer-divider" style="margin-top:0"></div>
            <p class="footer-copy">&copy; 2026 Clarivo. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="auth.js"></script>
</body>
</html>
